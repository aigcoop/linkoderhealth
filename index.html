                images: ["images/테라패치1.jpg", "images/테라패치2.jpg", "images/테라패치3.jpg", "images/테라패치4.jpg"] 
            },
            {

                content: "체계적인 3단계 비움 프로그램을 위한 올인원 다이어트 팩입니다.", 
                officialUrl: "https://vcshop.gcoop.com/kr/display?cate=387&itemNo=6030", 
                points: ["디엘릭서 풀 라인업 포함", "3/3/3 단계별 프로그램 가이드", "균형 잡힌 영양 보충"],
                images: ["images/디톡스1.jpg", "images/디톡스2.jpg", "images/디톡스3.jpg", "images/디톡스4.jpg"] 
            },
            { 
                id: 32, category: "텔로메라GK,정", title: "텔로메라 지케이(GK)", 
                content: "필름형 제형으로 점막 흡수가 용이한 고농축 활력 관리 제품입니다.", 
                officialUrl: "https://vcshop.gcoop.com/kr/display?cate=290&itemNo=5940", 
                points: ["구강 점막 흡수 필름 제형", "간편한 휴대 및 섭취", "프리미엄 원료 농축"],
                images: ["images/텔로메라1.jpg", "images/텔로메라2.jpg", "images/텔로메라3.jpg", "images/텔로메라4.jpg"] 
            },
            { 
                id: 33, category: "텔로메라GK,정", title: "텔로메라 정", 
                content: "체내 에너지 생성과 대사를 활발하게 돕는 영양 농축 정제입니다.", 
                officialUrl: "https://vcshop.gcoop.com/kr/display?cate=290&itemNo=5945", 
                points: ["에너지 대사 나이아신 배합", "강력한 활력 부스팅", "하루 2정 간편 관리"],
                images: ["images/텔로메라정1.jpg", "images/텔로메라정2.jpg", "images/텔로메라정3.jpg", "images/텔로메라정4.jpg"] 
            }
        ];

        function App() {
            const [selectedCategory, setSelectedCategory] = useState("전체보기");
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [modalTab, setModalTab] = useState("이미지");
            const [fullScreenImage, setFullScreenImage] = useState(null);
            const [showToast, setShowToast] = useState(null);
            const [personalLinks, setPersonalLinks] = useState({});
            const [myCustomLinks, setMyCustomLinks] = useState([]);
            
            const [newLinkName, setNewLinkName] = useState("");
            const [newLinkUrl, setNewLinkUrl] = useState("");
            const [editingLinkId, setEditingLinkId] = useState(null);

            const SHOP_URL = "https://vcshop.gcoop.com/kr";
            const DEFAULT_FALLBACK_URL = "https://vcshop.gcoop.com/kr/display?cate=7&itemNo=3189";

            useEffect(() => {
                const savedPersonal = localStorage.getItem('gcoop_personalLinks');
                if (savedPersonal) setPersonalLinks(JSON.parse(savedPersonal));
                const savedCustom = localStorage.getItem('gcoop_myCustomLinks');
                if (savedCustom) setMyCustomLinks(JSON.parse(savedCustom));
            }, []);

            const filteredProducts = useMemo(() => {
                return INITIAL_PRODUCTS.filter(p => {
                    const matchesCategory = selectedCategory === "전체보기" || p.category === selectedCategory;
                    return matchesCategory && p.title.toLowerCase().includes(searchQuery.toLowerCase());
                });
            }, [selectedCategory, searchQuery]);

            const displayToast = (msg) => {
                setShowToast(msg);
                setTimeout(() => setShowToast(null), 2500);
            };

            const handleSaveLink = (productId, index, name, url) => {
                if (!url) { displayToast("주소를 입력해주세요."); return; }
                const updatedLinks = { ...personalLinks };
                if (!updatedLinks[productId]) updatedLinks[productId] = {};
                updatedLinks[productId][`link${index}`] = { name, url };
                setPersonalLinks(updatedLinks);
                localStorage.setItem('gcoop_personalLinks', JSON.stringify(updatedLinks));
                displayToast(`${name} 정보가 저장되었습니다.`);
            };

            const handleDeleteLink = (productId, index) => {
                const updatedLinks = { ...personalLinks };
                if (updatedLinks[productId]) {
                    delete updatedLinks[productId][`link${index}`];
                    setPersonalLinks(updatedLinks);
                    localStorage.setItem('gcoop_personalLinks', JSON.stringify(updatedLinks));
                    displayToast("정보가 삭제되었습니다.");
                }
            };

            const handleAddCustomLink = () => {
                if (!newLinkUrl) { displayToast("주소를 입력해주세요."); return; }
                let updatedCustom;
                if (editingLinkId) {
                    updatedCustom = myCustomLinks.map(link => link.id === editingLinkId ? { ...link, name: newLinkName || "제목 없음", url: newLinkUrl } : link);
                    displayToast("링크가 수정되었습니다.");
                    setEditingLinkId(null);
                } else {
                    const newLink = { id: Date.now().toString(), name: newLinkName || "제목 없음", url: newLinkUrl, createdAt: Date.now() };
                    updatedCustom = [newLink, ...myCustomLinks];
                    displayToast("새 링크가 등록되었습니다.");
                }
                setMyCustomLinks(updatedCustom);
                localStorage.setItem('gcoop_myCustomLinks', JSON.stringify(updatedCustom));
                setNewLinkName("");
                setNewLinkUrl("");
            };

            const handleEditCustomLink = (link) => {
                setNewLinkName(link.name);
                setNewLinkUrl(link.url);
                setEditingLinkId(link.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDeleteCustomLink = (id) => {
                const updatedCustom = myCustomLinks.filter(link => link.id !== id);
                setMyCustomLinks(updatedCustom);
                localStorage.setItem('gcoop_myCustomLinks', JSON.stringify(updatedCustom));
                displayToast("링크가 삭제되었습니다.");
            };

            const handleCopyText = async (text, label) => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    displayToast(`${label} 복사 완료!`);
                } catch (err) { displayToast("복사 실패"); }
            };

            const handleShareLink = async (name, url) => {
                if (!navigator.share) { handleCopyText(url, "주소"); return; }
                try { await navigator.share({ title: name, url: url }); } catch (e) { }
            };

            const handleShareSite = async () => {
                if (navigator.share) {
                    try { await navigator.share({ title: '지쿱 공식 쇼핑몰', url: SHOP_URL }); } catch (e) { }
                } else {
                    handleCopyText(SHOP_URL, "쇼핑몰 주소");
                }
            };

            const handleBatchDownload = (e, product) => {
                if (e) e.stopPropagation();
                product.images.forEach((img, index) => {
                    const link = document.createElement('a');
                    link.href = img;
                    link.download = `${product.title}_${index + 1}.jpg`;
                    setTimeout(() => link.click(), index * 250);
                });
                displayToast("이미지 저장 시작...");
            };

            const handleSingleDownload = (e, url, title, idx) => {
                if (e) e.stopPropagation();
                const link = document.createElement('a');
                link.href = url;
                link.download = `${title}_${idx + 1}.jpg`;
                link.click();
                displayToast("이미지 저장 중...");
            };

            const openProductModal = (product) => {
                setSelectedProduct(product);
                setModalTab("이미지");
            };

            return (
                <div className="min-h-screen pb-24 text-slate-900">
                    <header className="fixed top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-lg border-b px-4 py-4 h-16 flex items-center justify-between shadow-sm text-center">
                        <div className="flex items-center gap-2 overflow-hidden mx-auto md:mx-0">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white shadow-lg flex-shrink-0"><Icon name="layout-grid" size={18} /></div>
                            <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-3 overflow-hidden text-left">
                                <h1 className="text-[11px] md:text-sm font-black text-slate-800 tracking-tight whitespace-nowrap truncate">
                                    지쿱 제품 이미지 및 성분표, 링크오더 보관소
                                </h1>
                                <div className="flex items-center gap-2">
                                    <a href={SHOP_URL} target="_blank" rel="noopener noreferrer" className="bg-emerald-500 text-white px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-bold flex items-center justify-center gap-1 shadow-sm hover:bg-emerald-600 active:scale-95 w-fit flex-shrink-0">
                                        <Icon name="shopping-bag" size={10} /> 지쿱 쇼핑몰 바로가기
                                    </a>
                                    <button onClick={handleShareSite} className="bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-bold flex items-center justify-center gap-1 border border-indigo-100 shadow-sm hover:bg-indigo-100 active:scale-95 flex-shrink-0">
                                        <Icon name="share-2" size={10} /> 주소 공유
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="fixed top-16 left-0 right-0 z-30 bg-white border-b shadow-sm">
                        <div className="px-4 py-2 border-b bg-slate-50">
                            <div className="relative">
                                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="제품명 검색..." className="w-full pl-9 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm text-center" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                        </div>
                        <div className="flex items-center bg-white px-2 overflow-x-auto no-scrollbar py-3 gap-2">
                            {CATEGORIES.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-3 py-1.5 rounded-full text-[10px] font-bold border transition-all ${selectedCategory === cat ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-500 border-slate-200 active:bg-indigo-50'}`}>{cat}</button>
                            ))}
                        </div>
                    </div>

                    <main className="pt-48 px-2 max-w-6xl mx-auto text-center">
                        {selectedCategory === "기타" ? (
                            <div className="max-w-xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white rounded-[2rem] p-6 shadow-md border border-indigo-100 mb-8 text-center">
                                    <div className="flex items-center justify-center gap-2 mb-4">
                                        <div className="bg-indigo-600 w-1.5 h-5 rounded-full"></div>
                                        <h2 className="text-lg font-black text-slate-800">나만의 URL 관리자 (내 컴퓨터 전용)</h2>
                                    </div>
                                    <div className="flex flex-col gap-3">
                                        <input type="text" value={newLinkName} onChange={(e) => setNewLinkName(e.target.value)} placeholder="URL 이름을 입력하세요" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-center" />
                                        <input type="text" value={newLinkUrl} onChange={(e) => setNewLinkUrl(e.target.value)} placeholder="주소(URL)를 입력하세요" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-center" />
                                        <button onClick={handleAddCustomLink} className="w-full bg-indigo-600 text-white py-3 rounded-2xl font-bold text-sm shadow-lg hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-2"><Icon name={editingLinkId ? "check" : "plus-circle"} size={18} />{editingLinkId ? "수정 완료" : "나만의 주소 등록하기"}</button>
                                        {editingLinkId && <button onClick={() => { setEditingLinkId(null); setNewLinkName(""); setNewLinkUrl(""); }} className="text-xs text-slate-400 font-bold underline">취소하기</button>}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    {myCustomLinks.length > 0 ? myCustomLinks.map(link => (
                                        <div key={link.id} className="bg-white border border-slate-200 rounded-3xl p-5 shadow-sm hover:shadow-md transition-all text-center">
                                            <div className="flex flex-col gap-2">
                                                <h3 className="font-black text-indigo-600 text-sm truncate">{link.name}</h3>
                                                <p className="text-xs text-slate-400 truncate mb-2">{link.url}</p>
                                                <div className="flex gap-2">
                                                    <button onClick={() => handleEditCustomLink(link)} className="flex-1 bg-slate-100 text-slate-600 py-2 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 active:scale-95"><Icon name="edit-3" size={12} /> 수정</button>
                                                    <button onClick={() => handleCopyText(link.url, "주소")} className="flex-1 bg-slate-100 text-slate-600 py-2 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 active:scale-95"><Icon name="copy" size={12} /> 복사</button>
                                                    <button onClick={() => handleShareLink(link.name, link.url)} className="flex-1 bg-indigo-50 text-indigo-600 py-2 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 active:scale-95"><Icon name="share" size={12} /> 공유</button>
                                                    <button onClick={() => handleDeleteCustomLink(link.id)} className="bg-rose-50 text-rose-500 px-3 py-2 rounded-xl text-[10px] font-bold flex items-center justify-center active:scale-95"><Icon name="trash-2" size={12} /></button>
                                                </div>
                                            </div>
                                        </div>
                                    )) : <div className="text-center py-20 text-slate-300 font-bold">등록된 주소가 없습니다.</div>}
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 text-center">
                                {filteredProducts.map(product => (
                                    <div key={product.id} onClick={() => openProductModal(product)} className="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-200 cursor-pointer active:scale-[0.98] group flex flex-col relative text-center">
                                        <button onClick={(e) => handleBatchDownload(e, product)} className="absolute top-1 right-1 z-10 p-1.5 bg-indigo-600/90 text-white rounded-lg shadow-lg opacity-0 group-hover:opacity-100 md:opacity-100 transition-opacity"><Icon name="download" size={12} /></button>
                                        <OptimizedImage src={product.images[0]} alt={product.title} />
                                        <div className="p-1.5 flex-1 flex flex-col justify-center min-h-[55px] bg-white">
                                            <p className="text-[7px] font-bold text-indigo-500 uppercase mb-0.5">{product.category}</p>
                                            <h3 className="font-bold text-[10px] sm:text-[12px] leading-tight line-clamp-2 text-slate-900">{product.title}</h3>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Product Detail Modal with 3 Tabs */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md" onClick={() => setSelectedProduct(null)}>
                            <div className="bg-white w-full max-w-2xl rounded-[2.5rem] overflow-hidden flex flex-col h-[85vh] shadow-2xl relative text-center animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                                {/* Modal Header */}
                                <div className="p-6 pb-2 shrink-0 bg-white relative">
                                    <div className="flex flex-col items-center">
                                        <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2.5 py-0.5 rounded-full uppercase border border-indigo-100 mb-2">
                                            {selectedProduct.category}
                                        </span>
                                        <h2 className="text-xl font-black text-slate-900 leading-tight mb-4">{selectedProduct.title}</h2>
                                    </div>
                                    <button onClick={() => setSelectedProduct(null)} className="absolute top-6 right-6 p-2.5 bg-slate-100 rounded-full text-slate-500 active:scale-90 shadow-sm">
                                        <Icon name="x" size={20} />
                                    </button>
                                    
                                    <div className="flex border-b border-slate-100 mt-2 px-2">
                                        {[
                                            { id: "이미지", icon: "image" },
                                            { id: "상세/성분", icon: "file-text" },
                                            { id: "내 링크오더", icon: "link" }
                                        ].map(tab => (
                                            <button 
                                                key={tab.id}
                                                onClick={() => setModalTab(tab.id)}
                                                className={`flex-1 flex items-center justify-center gap-2 py-3 text-xs font-bold transition-all border-b-2 ${modalTab === tab.id ? 'text-indigo-600 border-indigo-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}
                                            >
                                                <Icon name={tab.icon} size={14} />
                                                {tab.id}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Content Area */}
                                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-slate-50/30">
                                    {/* TAB 1: 이미지 */}
                                    {modalTab === "이미지" && (
                                        <div className="animate-in fade-in duration-300">
                                            <div className="flex justify-end mb-4">
                                                <button onClick={() => handleBatchDownload(null, selectedProduct)} className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100 flex items-center gap-1 active:scale-95 shadow-sm">
                                                    <Icon name="download" size={12} /> 전체 이미지 저장
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {selectedProduct.images.map((img, idx) => (
                                                    <div key={idx} className="relative group rounded-3xl overflow-hidden shadow-md border border-slate-200 bg-white">
                                                        <OptimizedImage 
                                                            src={img} 
                                                            alt={`Product ${idx}`} 
                                                            aspect="aspect-square" 
                                                            onClick={() => setFullScreenImage(img)}
                                                        />
                                                        <div className="absolute top-3 left-3 bg-black/40 backdrop-blur-md text-white text-[9px] px-2.5 py-1 rounded-full font-bold">
                                                            {idx === 0 ? "메인" : idx === 3 ? "상세/성분" : `이미지 ${idx+1}`}
                                                        </div>
                                                        <button 
                                                            onClick={(e) => handleSingleDownload(e, img, selectedProduct.title, idx)}
                                                            className="absolute bottom-3 right-3 p-2.5 bg-white/90 backdrop-blur-md text-indigo-600 rounded-2xl shadow-xl hover:bg-indigo-600 hover:text-white transition-all active:scale-90 border border-slate-100"
                                                        >
                                                            <Icon name="download" size={16} />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB 2: 상세/성분 (더욱 디테일하게 보강) */}
                                    {modalTab === "상세/성분" && (
                                        <div className="animate-in fade-in duration-300 space-y-5 max-w-lg mx-auto text-left">
                                            {/* Overview Card */}
                                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 relative overflow-hidden group text-center">
                                                <div className="flex items-center justify-center gap-2 mb-4">
                                                    <div className="w-1.5 h-1.5 bg-indigo-600 rounded-full"></div>
                                                    <h3 className="text-[11px] font-black text-indigo-600 uppercase tracking-widest">Product Description</h3>
                                                </div>
                                                <div className="space-y-5">
                                                    <div className="text-center">
                                                        <h4 className="text-[11px] font-bold text-slate-800 mb-2 flex items-center justify-center gap-1.5">
                                                            <Icon name="check-circle" size={14} className="text-emerald-500" /> 제품 특징 및 요약
                                                        </h4>
                                                        <p className="text-[13px] text-slate-700 leading-relaxed font-medium">{selectedProduct.content}</p>
                                                    </div>

                                                    {selectedProduct.points && (
                                                        <div className="text-center">
                                                            <h4 className="text-[11px] font-bold text-slate-800 mb-2 flex items-center justify-center gap-1.5">
                                                                <Icon name="star" size={14} className="text-amber-500" /> 핵심 포인트 (Key Points)
                                                            </h4>
                                                            <div className="flex flex-col items-center gap-1.5">
                                                                {selectedProduct.points.map((pt, i) => (
                                                                    <div key={i} className="text-[12.5px] text-slate-600 font-bold">• {pt}</div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                    {selectedProduct.usage && (
                                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                                                            <h4 className="text-[11px] font-bold text-indigo-600 mb-2 flex items-center justify-center gap-1.5">
                                                                <Icon name="info" size={14} /> 섭취 및 사용 방법
                                                            </h4>
                                                            <p className="text-[12.5px] text-slate-600 leading-relaxed font-medium">{selectedProduct.usage}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Ingredients Section */}
                                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 text-center">
                                                <div className="flex items-center justify-center gap-2 mb-4">
                                                    <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                                                    <h3 className="text-[11px] font-black text-emerald-500 uppercase tracking-widest">Ingredients (주요 성분)</h3>
                                                </div>
                                                <div className="bg-emerald-50/50 rounded-2xl p-4 border border-emerald-100/50">
                                                    <p className="text-[12.5px] text-slate-700 leading-relaxed font-medium tracking-tight">
                                                        {selectedProduct.ingredients || "상세 이미지의 성분표를 통해 전성분을 확인하실 수 있습니다."}
                                                    </p>
                                                </div>
                                            </div>

                                            {/* Recommendation Section */}
                                            {selectedProduct.recommend && (
                                                <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 text-center">
                                                    <div className="flex items-center justify-center gap-2 mb-4">
                                                        <div className="w-1.5 h-1.5 bg-amber-500 rounded-full"></div>
                                                        <h3 className="text-[11px] font-black text-amber-500 uppercase tracking-widest">Recommended For</h3>
                                                    </div>
                                                    <div className="flex flex-col gap-2">
                                                        {selectedProduct.recommend.map((rec, i) => (
                                                            <div key={i} className="flex items-center justify-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                                <div className="bg-white w-6 h-6 rounded-full flex items-center justify-center shadow-sm text-[10px] font-black text-indigo-600 shrink-0">{i+1}</div>
                                                                <span className="text-[12.5px] text-slate-600 font-bold">{rec}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            
                                            <p className="text-[10px] text-slate-400 text-center mt-4 font-medium italic">※ 상세한 전성분 및 주의사항은 제품 이미지 탭의 성분표 사진을 반드시 참고해 주세요.</p>
                                        </div>
                                    )}

                                    {/* TAB 3: 내 링크오더 */}
                                    {modalTab === "내 링크오더" && (
                                        <div className="animate-in fade-in duration-300 max-lg mx-auto">
                                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200 mb-4 text-center">
                                                <div className="flex items-center justify-center gap-2 mb-6 text-center">
                                                    <div className="w-1 h-4 bg-indigo-600 rounded-full"></div>
                                                    <h3 className="font-bold text-slate-800 text-base tracking-tight italic underline decoration-indigo-200">나의 마케팅 채널 설정</h3>
                                                </div>

                                                {/* 쇼핑몰 상세페이지 고정 링크 섹션 */}
                                                <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-8 shadow-inner text-center">
                                                    <div className="flex flex-col gap-2">
                                                        <p className="text-[11px] font-black text-indigo-700 flex items-center justify-center gap-1.5">
                                                            <Icon name="external-link" size={12} />
                                                            쇼핑몰 상세페이지 (클릭시이동)
                                                        </p>
                                                        <a 
                                                            href={selectedProduct.officialUrl || DEFAULT_FALLBACK_URL} 
                                                            target="_blank" 
                                                            rel="noopener noreferrer" 
                                                            className="text-[10px] text-slate-500 break-all underline decoration-slate-300 font-medium block text-center"
                                                        >
                                                            {selectedProduct.officialUrl || DEFAULT_FALLBACK_URL}
                                                        </a>
                                                        <div className="flex gap-2 mt-1">
                                                            <button 
                                                                onClick={() => handleShareLink("쇼핑몰 상세페이지", selectedProduct.officialUrl || DEFAULT_FALLBACK_URL)}
                                                                className="flex-1 bg-white text-indigo-600 border border-indigo-100 px-3 py-2 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 active:scale-95 shadow-sm"
                                                            >
                                                                <Icon name="share" size={12} /> 공유하기
                                                            </button>
                                                            <button 
                                                                onClick={() => handleCopyText(selectedProduct.officialUrl || DEFAULT_FALLBACK_URL, "상세페이지 주소")}
                                                                className="bg-white text-slate-400 border border-slate-100 px-3 py-2 rounded-xl text-[10px] font-bold flex items-center justify-center gap-1 active:scale-95 shadow-sm"
                                                            >
                                                                <Icon name="copy" size={12} /> 복사
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="flex items-center justify-center gap-2 mb-4 px-2 text-center">
                                                    <div className="bg-slate-200 h-[1px] flex-1"></div>
                                                    <span className="text-[9px] font-bold text-slate-300 uppercase">개인 등록 링크 (5개)</span>
                                                    <div className="bg-slate-200 h-[1px] flex-1"></div>
                                                </div>

                                                {[1, 2, 3, 4, 5].map((num) => (
                                                    <LinkOrderItem 
                                                        key={num} 
                                                        productId={selectedProduct.id} 
                                                        num={num} 
                                                        defaultLabel={`링크 ${num}`} 
                                                        data={personalLinks[selectedProduct.id]?.[`link${num}`]} 
                                                        onSave={handleSaveLink} 
                                                        onDelete={handleDeleteLink} 
                                                        onCopy={handleCopyText} 
                                                        onShare={handleShareLink} 
                                                    />
                                                ))}
                                                <p className="text-[10px] text-slate-400 mt-4 font-medium text-center">※ 기기 로컬 스토리지에 안전하게 보관됩니다.</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="p-4 bg-white border-t shrink-0 text-center">
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center">© GCOOP Partner PRO HUB - 사업자 도구</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Image Full Screen Overlay */}
                    {fullScreenImage && (
                        <div className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-2 sm:p-8 animate-in fade-in zoom-in-95 duration-200" onClick={() => setFullScreenImage(null)}>
                            <div className="relative w-full h-full flex items-center justify-center max-w-4xl mx-auto text-center">
                                <button 
                                    onClick={() => setFullScreenImage(null)}
                                    className="absolute top-4 right-4 z-[210] p-3 bg-white/10 hover:bg-white/20 text-white rounded-full transition-colors active:scale-90 shadow-2xl"
                                >
                                    <Icon name="x" size={28} />
                                </button>
                                <img 
                                    src={fullScreenImage} 
                                    className="max-w-full max-h-full object-contain rounded-lg shadow-2xl mx-auto" 
                                    alt="Full view"
                                    onClick={e => e.stopPropagation()}
                                />
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {showToast && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[250] bg-slate-900/90 backdrop-blur-md text-white px-6 py-3.5 rounded-2xl shadow-2xl text-[11px] font-bold animate-in slide-in-from-bottom-5 duration-300 flex items-center gap-2 border border-white/10">
                            <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse" />
                            {showToast}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
